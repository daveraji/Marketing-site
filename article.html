<!DOCTYPE html>
<html lang="en" data-color-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daylines Article</title>
  <meta name="description" content="Read this article on Daylines">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Libre+Baskerville:wght@400;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-base: #f4f5f6;
      --bg-surface: #ffffff;
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --text-muted: #71717a;
      --accent: #18181b;
      --font-heading: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-serif: 'Libre Baskerville', Georgia, serif;
      --transition: 0.25s ease;
    }

    html[data-color-mode="dark"] {
      --bg-base: #0c0d0f;
      --bg-surface: #131418;
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --accent: #ffffff;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      border: none;
      outline: none;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      line-height: 1.6;
      transition: background-color var(--transition), color var(--transition);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    .article-nav {
      position: sticky;
      top: 0;
      background-color: rgba(244, 245, 246, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      transition: background-color var(--transition);
    }

    html[data-color-mode="dark"] .article-nav {
      background-color: rgba(12, 13, 15, 0.9);
    }

    .nav-brand {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .dark-toggle {
      background: var(--text-primary);
      color: var(--bg-base);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 100px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      transition: background-color var(--transition), color var(--transition), transform 0.15s ease;
    }

    .dark-toggle:hover { transform: scale(1.03); }

    html[data-color-mode="dark"] .dark-toggle {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    .dark-toggle svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── Hero Image ── */
    .hero-image {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      display: none;
    }

    /* ── Content ── */
    .content-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .article-title {
      font-family: var(--font-serif);
      font-size: clamp(1.75rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .source-badge {
      background: var(--accent);
      color: var(--bg-base);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    html[data-color-mode="dark"] .source-badge {
      color: var(--bg-base);
    }

    .article-body {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      line-height: 1.85;
      color: var(--text-secondary);
      margin-bottom: 48px;
      white-space: pre-wrap;
    }

    /* ── CTA ── */
    .actions-container {
      margin-top: 48px;
      padding-top: 40px;
      box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    html[data-color-mode="dark"] .actions-container {
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }

    .actions-container h2 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .actions-container p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .cta-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 320px;
      padding: 15px 24px;
      border-radius: 14px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-primary {
      background-color: var(--accent);
      color: var(--bg-base);
    }

    .btn-secondary {
      background-color: var(--bg-surface);
      color: var(--text-primary);
    }

    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: var(--text-primary);
      color: var(--bg-base);
      padding: 14px 24px;
      border-radius: 14px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.9rem;
      max-width: 320px;
      width: 100%;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .store-btn:hover { transform: translateY(-2px); }

    .store-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .store-btn .sub-text {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 2px;
    }

    .store-btn .main-text {
      display: block;
      font-size: 0.95rem;
      line-height: 1;
    }

    @media (max-width: 640px) {
      .content-container { padding: 28px 20px 60px; }
    }
  </style>
</head>
<body>

  <!-- ── Nav ── -->
  <nav class="article-nav" aria-label="Article navigation">
    <a href="index.html" class="nav-brand">daylines</a>
    <button class="dark-toggle" id="dark-toggle-btn" aria-label="Toggle dark mode">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
      </svg>
      Dark mode
    </button>
  </nav>

  <!-- ── Hero image (shown if article has one) ── -->
  <img id="article-img" class="hero-image" src="" alt="Article image">

  <!-- ── Article content ── -->
  <div class="content-container">
    <h1 id="article-title" class="article-title">…</h1>

    <div class="article-meta">
      <span id="article-source" class="source-badge">NEWS</span>
      <span id="article-domain"></span>
    </div>

    <div id="article-body" class="article-body">
      Loading article content…
    </div>

    <div class="actions-container">
      <h2>Get the full experience</h2>
      <p>Read more stories personalised to your interests in the Daylines app.</p>

      <div class="cta-buttons">
        <a id="original-link" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">
          Open Original Source
        </a>
        <a href="https://apps.apple.com/us/app/daylines-current-news-brief/id6758858880"
           class="store-btn" target="_blank" rel="noopener" aria-label="Download Daylines on the App Store">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.05-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.57 2.95-1.4"/>
          </svg>
          <div>
            <span class="sub-text">Download on the</span>
            <span class="main-text">App Store</span>
          </div>
        </a>
      </div>
    </div>
  </div>

  <script>
    // ── Dark mode ──
    (function () {
      const btn = document.getElementById('dark-toggle-btn');
      const html = document.documentElement;
      html.setAttribute('data-color-mode', localStorage.getItem('color-mode') || 'light');
      btn.addEventListener('click', () => {
        const next = html.getAttribute('data-color-mode') === 'light' ? 'dark' : 'light';
        html.setAttribute('data-color-mode', next);
        localStorage.setItem('color-mode', next);
      });
    })();

    // ── Parse URL params and populate article ──
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const title  = params.get('title');
      const url    = params.get('url');
      const source = params.get('source');
      const desc   = params.get('desc');
      const img    = params.get('img');

      if (title) {
        document.getElementById('article-title').textContent = title;
        document.title = title + ' — Daylines';
      }

      if (source) {
        document.getElementById('article-source').textContent = source;
      }

      if (img) {
        const imgEl = document.getElementById('article-img');
        imgEl.src = img;
        imgEl.style.display = 'block';
      }

      if (desc) {
        document.getElementById('article-body').textContent = desc;
      } else {
        document.getElementById('article-body').innerHTML =
          '<em>No content summary available for this article. Download the app to read it in full.</em>';
      }

      if (url) {
        document.getElementById('original-link').href = url;
        try {
          document.getElementById('article-domain').textContent =
            new URL(url).hostname.replace('www.', '');
        } catch (e) {}
      } else {
        document.getElementById('original-link').style.display = 'none';
      }
    });
  </script>
</body>
</html>
